<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>基金/指数实时监控</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div>
        <h1>基金 / 指数监控</h1>
        <p class="subtitle">个人关注标的实时行情 · 数据仅供参考</p>
      </div>
      <div class="header-meta">
        <span id="last-update">加载中…</span>
        <button id="refresh-btn" type="button">立即刷新</button>
      </div>
    </header>

    <section>
      <h2 class="section-title">指数</h2>
      <div id="indices-grid" class="grid"></div>
    </section>

    <section>
      <h2 class="section-title">场外基金估值</h2>
      <p class="hint">盘中为估算净值，非实际成交价</p>
      <div id="funds-grid" class="grid"></div>
    </section>

    <footer class="footer">
      <p>数据来源：腾讯财经、天天基金 · 每 3 分钟自动刷新</p>
    </footer>
  </div>

  <div id="toast" class="toast hidden"></div>
  <script src="app.js"></script>
</body>
</html>
